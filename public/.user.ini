; PHP-FPM reads this file automatically from the document root (CGI/FastCGI mode).
; Settings here apply to all web requests served from this directory.
;
; NOTE: max_file_uploads is PHP_INI_SYSTEM and cannot be set here.
; To allow bulk spawn-file imports (>20 files at once) you must set it in
; your server's php.ini or a conf.d override:
;   max_file_uploads = 200
;
memory_limit = 512M
max_execution_time = 120
post_max_size = 80M
upload_max_filesize = 20M
